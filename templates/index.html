<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Ryzen Subscription Converter</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --panel: #111122;
            --border: #1e1e3f;
            --text: #e0e0ff;
            --accent: #00e5ff;
            --accent2: #ff0055;
            --input-bg: #0d0d1a;
            --glow: 0 0 15px #00e5ff44;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', 'JetBrains Mono', monospace;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            background-image:
                radial-gradient(ellipse at 20% 20%, #0d0d2b 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, #1a0a1e 0%, transparent 60%);
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 28px;
            box-shadow: 0 0 40px #000000aa, var(--glow);
            backdrop-filter: blur(12px);
            padding: 2rem 2.2rem;
            transition: all 0.3s;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1.2rem;
        }

        .logo {
            font-size: 2.5rem;
            filter: drop-shadow(0 0 8px var(--accent));
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            background: linear-gradient(135deg, var(--accent), #d500f9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .badge {
            background: #ff005520;
            border: 1px solid var(--accent2);
            color: var(--accent2);
            padding: 0.2rem 1rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 1px;
            margin-left: auto;
        }

        .input-group {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 1.8rem;
            flex-wrap: wrap;
        }

        input {
            flex: 1 1 300px;
            padding: 1rem 1.5rem;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
            font-family: 'JetBrains Mono', monospace;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 18px var(--accent);
        }

        button {
            background: linear-gradient(135deg, #00e5ff, #0077ff);
            border: none;
            border-radius: 16px;
            padding: 1rem 2rem;
            font-weight: bold;
            font-size: 1rem;
            color: #000;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.2s;
            text-transform: uppercase;
            box-shadow: 0 0 20px #00e5ff66;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 35px #00e5ffaa;
        }

        button:active {
            transform: scale(0.97);
        }

        .status {
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            min-height: 24px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #aaa;
        }

        .output-area {
            background: #050510;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            position: relative;
            margin-top: 1rem;
            overflow: hidden;
        }

        .output-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .output-header span {
            font-weight: 600;
            color: var(--accent);
            letter-spacing: 1px;
        }

        .copy-btn {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 0.3rem 1.2rem;
            border-radius: 10px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: none;
            text-transform: none;
        }

        .copy-btn:hover {
            background: #00e5ff22;
            box-shadow: 0 0 15px var(--accent);
        }

        pre {
            background: #000000;
            border-radius: 12px;
            padding: 1.2rem;
            overflow-x: auto;
            font-size: 0.85rem;
            line-height: 1.5;
            color: #ccc;
            max-height: 60vh;
            border: 1px solid #1e1e3f;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .loader {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #00e5ff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error {
            color: var(--accent2);
            font-weight: bold;
        }

        .footer {
            margin-top: 1.5rem;
            text-align: right;
            font-size: 0.7rem;
            color: #555;
            letter-spacing: 0.5px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 1.5rem;
            }
            h1 {
                font-size: 1.4rem;
            }
            button {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">⚡</div>
            <h1>RYZEN CONVERTER</h1>
            <div class="badge">VLESS / VMESS / TROJAN / SS</div>
        </div>

        <div class="input-group">
            <input
                type="text"
                id="urlInput"
                placeholder="Вставь URL подписки..."
                autocomplete="off"
            >
            <button id="generateBtn">
                <span>🚀</span> СГЕНЕРИРОВАТЬ
            </button>
        </div>

        <div class="status" id="status"></div>

        <div class="output-area" id="outputArea" style="display: none;">
            <div class="output-header">
                <span>📋 Clash YAML</span>
                <button class="copy-btn" id="copyBtn">📋 Копировать</button>
            </div>
            <pre id="yamlOutput"></pre>
        </div>
        <div class="footer">Powered by Ryzen AI · Изолированная симуляция</div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const generateBtn = document.getElementById('generateBtn');
        const statusDiv = document.getElementById('status');
        const outputArea = document.getElementById('outputArea');
        const yamlOutput = document.getElementById('yamlOutput');
        const copyBtn = document.getElementById('copyBtn');

        function setStatus(text, isError = false) {
            statusDiv.innerHTML = text;
            statusDiv.className = 'status' + (isError ? ' error' : '');
        }

        async function generateConfig() {
            const url = urlInput.value.trim();
            if (!url) {
                setStatus('❌ Введи URL подписки', true);
                return;
            }

            outputArea.style.display = 'none';
            setStatus('🔄 <span class="loader"></span> Загрузка и парсинг подписки...');
            generateBtn.disabled = true;

            try {
                const response = await fetch(`/config.yaml?url=${encodeURIComponent(url)}`);
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText || `Ошибка HTTP ${response.status}`);
                }
                const yamlText = await response.text();
                yamlOutput.textContent = yamlText;
                outputArea.style.display = 'block';
                setStatus('✅ Конфиг успешно сгенерирован!');
            } catch (err) {
                setStatus(`❌ ${err.message}`, true);
            } finally {
                generateBtn.disabled = false;
            }
        }

        generateBtn.addEventListener('click', generateConfig);
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') generateConfig();
        });

        copyBtn.addEventListener('click', () => {
            const text = yamlOutput.textContent;
            navigator.clipboard.writeText(text).then(() => {
                copyBtn.textContent = '✅ Скопировано!';
                setTimeout(() => { copyBtn.textContent = '📋 Копировать'; }, 2000);
            }).catch(() => {
                // Fallback
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                copyBtn.textContent = '✅ Скопировано!';
                setTimeout(() => { copyBtn.textContent = '📋 Копировать'; }, 2000);
            });
        });
    </script>
</body>
</html>
